version: "3.9"

services:

  mysql:

    image: mysql:8.4

    container_name: mysql-demo

    restart: unless-stopped

    environment:

      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: demo

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  ms-demo:

    image: ms-demo-jenkins:latest

    container_name: ms-demo

    restart: unless-stopped

    depends_on:
      - mysql

    ports:
      - "8081:8080"

    environment:

      SERVER_PORT: 8080

      DB_URL: jdbc:mysql://mysql:3306/demo

      DB_USER: root

      DB_PASSWORD: admin123

volumes:

  mysql_data: