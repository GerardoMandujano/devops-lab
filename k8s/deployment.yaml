apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-demo
  namespace: dev

spec:

  replicas: 2

  selector:
    matchLabels:
      app: ms-demo

  template:

    metadata:
      labels:
        app: ms-demo

    spec:

      containers:

        - name: ms-demo

          image: ms-demo-jenkins:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: ms-demo-config

            - secretRef:
                name: ms-demo-secret